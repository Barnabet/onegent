name: router
version: 0.2.0
owner: team-platform-ai

description: >
  Meta-pack that fronts the user. Decides which specialist pack should
  handle a request and delegates via orchestrator.delegate. May also
  perform small, read-only information gathering on attached files itself
  (PDF / spreadsheet inspection) so it can answer trivia or write a
  better sub-task for the specialist. See skills/router/SKILL.md for the
  routing rules.

skills:
  - router
  - pdf_handling
  - xlsx_handling

classification: internal
allowed_data_sources:
  - user_attachments

model: gpt-5.5

limits:
  max_tool_calls_per_run: 20
  max_tokens_per_run: 50000
  timeout_seconds: 300
